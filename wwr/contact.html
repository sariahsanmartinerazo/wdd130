<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, and customer support.">
    <meta name="author" content="Sariah Italletzy San Martin Erazo">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-crossedoars.png" alt="White Water Rafting">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Contact Us</h1>
        <section class="contact-info">
            <h2>Company Information</h2>
            <p>Address: 123 River Road, Colorado</p>
            <p>Phone: +1 (555) 123-4567</p>
            <p>Email: info@whitewaterrafting.com</p>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3764.840174168043!2d-96.77502632532865!3d19.33274044386346!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85c4c9ee9837e4d7%3A0x2759977f46a59fe5!2sArmon%C3%ADa%20Rafting!5e0!3m2!1ses-419!2smx!4v1781629601643!5m2!1ses-419!2smx"
              width="600" height="450" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>
        <section class="employees">
            <h2>Meet Our Team</h2>
            <div class="employee-gallery">
                <figure>
                    <img src="images/employee3.jpg" alt="Lead Guide">
                    <figcaption>
                        Lead Guide
                    </figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Adventure Coordinator">
                    <figcaption>
                        Adventure Coordinator
                    </figcaption>
                </figure>
                <figure>
                    <img src="images/employee1.jpeg" alt="Customer Support">
                    <figcaption>
                        Customer Support
                    </figcaption>
                </figure>
            </div>
        </section>
        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <label for="fullname">
                    Your Name
                </label>
                <input type="text" id="fullname" name="fullname" required>
                <label for="useremail">
                    Email Address
                </label>
                <input type="email" id="useremail" name="useremail" required>

                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label for="general">
                        <input type="radio" name="purpose" value="general" required>
                        General Inquiry
                    </label>
                    <label for="reservation">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>
                    <label for="website">
                        <input type="radio" id="website" name="purpose" value="website">
                        Website Suggestion
                    </label>
                </fieldset>
                <label for="message">
                    Message
                </label>
                <textarea id="message" name="message" rows="6"></textarea>
                <label>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>
                <button type="submit">
                    Send Message
                </button>
            </form>
        </section>
    </main>
    <footer>
        <p>
            &copy; 2026 White Water Rafting |
            Sariah Italletzy San Martin Erazo
        </p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="LinkedIn">
            </a>

        </nav>
    </footer>

</body>

</html>
