<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, and customer support.">
    <meta name="author" content="Sariah Italletzy San Martin Erazo">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-crossedoars.png" alt="White Water Rafting">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Contact Us</h1>
        <section class="contact-info">
            <h2>Company Information</h2>
            <p>Address: 123 River Road, Colorado</p>
            <p>Phone: +1 (555) 123-4567</p>
            <p>Email: info@whitewaterrafting.com</p>
            <iframe src="PEGA_AQUI_TU_MAPA" loading="lazy">
            </iframe>
        </section>
        <section class="employees">
            <h2>Meet Our Team</h2>
            <div class="employee-gallery">
                <figure>
                    <img src="images/employee1.jpg" alt="Lead Guide">
                    <figcaption>
                        Lead Guide
                    </figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Adventure Coordinator">
                    <figcaption>
                        Adventure Coordinator
                    </figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Customer Support">
                    <figcaption>
                        Customer Support
                    </figcaption>
                </figure>
            </div>
        </section>
        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form>
                <label for="fullname">
                    Your Name
                </label>
                <input type="text" id="fullname" name="fullname" required>
                <label for="useremail">
                    Email Address
                </label>
                <input type="email" id="useremail" name="useremail" required>
                <p>Purpose of Message</p>
                <label>
                    <input type="radio" name="purpose" value="general">
                    General Inquiry
                </label>
                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>
                <label>
                    <input type="radio" name="purpose" value="website">
                    Website Suggestion
                </label>
                <label for="message">
                    Message
                </label>
                <textarea id="message" name="message" rows="6">
                </textarea>
                <label>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>
                <button type="submit">
                    Send Message
                </button>
            </form>
        </section>
    </main>
    <footer>
        <p>
            &copy; 2026 White Water Rafting |
            Sariah Italletzy San Martin Erazo
        </p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="LinkedIn">
            </a>

        </nav>
    </footer>

</body>

</html>
